<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de botón</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <section id="wrapper-general">
        <section id="wrapper-letter-colour">
            <h2 id="letter-colour-title">Color de la letra</h2>
            <button id="letter-colour-1"></button>
            <button id="letter-colour-2"></button>
            <button id="letter-colour-3"></button>
            <button id="letter-colour-4"></button>
            <button id="letter-colour-5"></button>
        </section>
        <section id="wrapper-bg-colour">
            <h2 id="bg-colour-title">Color del fondo</h2>
            <button id="bg-colour-1"></button>
            <button id="bg-colour-2"></button>
            <button id="bg-colour-3"></button>
            <button id="bg-colour-4"></button>
            <button id="bg-colour-5"></button>
        </section>
        <section id="wrapper-shadows">
            <h2 id="shadow-title">Sombras</h2>
            <button id="no-shadow"></button>
            <button id="shadow-1"></button>
            <button id="shadow-2"></button>
            <button id="shadow-3"></button>
        </section>
        <section id="wrapper-border">
            <h2 id="border-title">Redondeado de bordes</h2>
            <input id="slider" type="range" min="0" max="25" value="5">
            <h2 id="slider-valor">Valor: 5</h2>
        </section>
        <section id="wrapper-gradient-bg">
            <h2 id="gradient-bg-title">Degradado de fondo</h2>
            <button id="linear-gradient"></button>
            <button id="radial-gradient"></button>
        </section>
        <section id="wrapper-result-apply">
            <section id="wrapper-result">
                <h2 id="result-title">Resultado</h2>
                <button id="result-button">Texto de ejemplo</button>
            </section>
            <section id="wrapper-apply">
                <input id="text-input" type="text" placeholder="Escribe algo aquí...">
                <input id="button-apply-changes" type="submit" value="Aplicar cambios">
            </section>
        </section>
    </section>
</body>
</html>
