<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <section class="wrapper">
        <h1>Buscador de libros</h1>
        <div class="contenedor-menu">
            <input type="text" id="entrada_texto" class="entrada_texto">
            <select name="selector" class="selector" id="selector">
                <option value="5" selected>5</option>
                <option value="10">10</option>
                <option value="20">20</option>
            </select>
            <button id="boton-buscar">Buscar</button>
        </div>
        <div id="results" class="results">
            <book-card title="El Señor de los Anillos" author="J.R.R. Tolkien" year="1954" cover-url="https://covers.openlibrary.org./b/id/9255566-M.jpg"></book-card>
        </div>
        <div id="pagination" class="pagination">
            <div class="controls-container">
                <button>Anterior</button>
                <button>Siguiente</button>
                <h2>Página 1 de 2</h2>
            </div>
        </div>
    </section>
</body>
</html>
