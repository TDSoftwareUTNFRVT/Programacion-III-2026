<!DOCTYPE html>
<html lang="es">
<head>
    <title>BotonOnePiece</title>
    <style>
        .btn-op {
            background-image: url(fotos/logo.jpeg);
            background-size: cover;
            background-position: center;
            width: 200px;
            height: 50px;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .btn-op:hover {
            background-image: url(fotos/personajes.webp);
        }
    </style>
</head>
<body>
    <button class="btn-op"></button>
</body>
</html>
