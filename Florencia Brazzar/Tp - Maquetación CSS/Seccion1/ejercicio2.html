<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio2</title>
  <style>
      body {
          background: #0e1117;
          padding: 40px;
          margin: 0;
      }

      .col {
        float: left;
        height: 300px;
      }
      .col-20 {
        width: 20%;
      }
      .col-60 {
        width: 60%;
      }
      .bg-violet {
        background: #6c63ff;
      }
      .bg-dark {
        background: #161b27;
      }
      .bg-red {
        background: #ff6584;
      }
      .bg-darker {
        background: #232a3e;
      }
      .bg-black {
        background: #0e1117;
      }
      .h-full {
        height: 60px; display: block;
      }
      .clear {
        clear: both;
      }
      .cf {
        display: flow-root;
      }
  </style>
</head>
<body>
  <div class="h-full bg-darker"></div>
  <div class="cf">
    <div class="col col-20 bg-violet"></div>
    <div class="col col-60 bg-dark"></div>
    <div class="col col-20 bg-red"></div>
  </div>
  <div class="h-full bg-black clear"></div>
</body>
</html>
