<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        .contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }

        .borde-animado {
            position: relative;
            width: fit-content;
            height: fit-content;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px; 
            overflow: hidden;
            border-radius: 60px;
        }

        .borde-animado::before {
            content: "";
            position: absolute;
            width: 300%; 
            height: 300%; 
            background: conic-gradient(transparent, #ffffff, transparent 30%);
            animation: rotar 2s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .borde-animado:hover::before {
            opacity: 1;
        }

        .boton {
            position: relative;
            z-index: 1; 
            padding: 100px 150px;
            font-size: 40px;
            font-family: "Arial", sans-serif;
            font-weight: bold;
            color: white;
            background-color: red;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            overflow: hidden;
        }

        .boton::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                transparent
            );
            transition: all 0.5s;
        }

       .boton:hover::before {
            left: 150%;
        }

        .boton:hover {
            background-color: #3b3fff;
            box-shadow: 0 0 30px rgba(59, 63, 255, 0.8);
        }

        @keyframes rotar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="borde-animado">
            <button class="boton">Click Aquí</button>
        </div>
    </div>
</body>
</html>
