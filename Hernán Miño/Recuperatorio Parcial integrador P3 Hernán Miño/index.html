<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial Programación III</title>
    <style>

        .contenedor-principal {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
            gap: 2rem;
        }

        .h1 {
            margin: 0;
            ;
        }

        .barra-busqueda {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }

        artist-card {
            flex: 1 1 calc(33% - 1rem);
        }

        @media(max-width:600px) {
            artist-card {
                flex: 1 1 100%;
            }
        }

        #pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1 rem;
        }
    </style>
</head>

<body>
    <div class="contenedor-principal">
        <h1 class="h1">Buscador de Artista</h1>
        <div class="barra-busqueda">
            <input type="text" id="input-busqueda" placeholder="Buscando artista...">
            <select id="select-cantidad">
                <option value="5">Mostrar 5 por página</option>
                <option value="10" selected>Mostrar 10 por página</option>
                <option value="15">Mostrar 15 por página</option>
            </select>
            <button id="btn-buscar">Buscar</button>
            <button id="btn-limpiar">Limpiar Busqueda</button>
        </div>
        <div id="results"></div>
        <div id="pagination"> </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
