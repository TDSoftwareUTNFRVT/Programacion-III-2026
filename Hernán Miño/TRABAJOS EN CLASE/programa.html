<!DOCTYPE HTML>
<head>
    <style>
        .top{height: 100px;background-color:green}

        .middle div{height:400px; width:33%;box-shadow: 20px 20px 10px pink;}   

        .bottom{height:100px; width:100%;background-color:black} 

        .izq{width:33%;background-color:blue;float:left;height:400px;}
        
        .izq:hover{background-color:red;border:2px solid black;border-radius:10px;}

        .medio{width:33%;background-color:yellow;float:left;height:400px;}

        .der{width:33%;background-color:blue;float:left;height:400px;}

    </style>
</head>
<body>
        <section class="top"></section>
            <section class="middle div">
                <div class="izq"></div>
                <div class="medio"></div>
                <div class="der"></div>
            </section>
        <section class="bottom"></section>
</body>
