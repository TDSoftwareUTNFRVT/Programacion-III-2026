<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f1219;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .grid-cards {
      font-size: 0;
      max-width: 900px;
      width: 100%;
      background: #1a1f2e;
      padding: 1.5rem;
      border-radius: 16px;
    }

    .card {
      display: inline-block;
      width: 31.33%;
      margin: 1%;
      height: 140px;
      vertical-align: top;
      border-radius: 8px;
      font-size: 16px;
    }

    .bg-violet { background: #6c63ff; }
    .bg-red    { background: #ff6584; }
    .bg-green  { background: #22c55e; }
    .bg-yellow { background: #f59e0b; }
    .bg-cyan   { background: #06b6d4; }
    .bg-pink   { background: #ec4899; }
  </style>
</head>
<body>
  <div class="grid-cards">
    <div class="card bg-violet"></div>
    <div class="card bg-red"></div>
    <div class="card bg-green"></div>
    <div class="card bg-yellow"></div>
    <div class="card bg-cyan"></div>
    <div class="card bg-pink"></div>
  </div>
</body>
</html>
