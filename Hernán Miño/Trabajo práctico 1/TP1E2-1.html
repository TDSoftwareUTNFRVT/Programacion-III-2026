<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .navbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: #161b27;
    }

    .links-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    @media (min-width: 768px) {
      .navbar {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }

    .logo { 
      width: 48px; 
      height: 32px; 
      background: #6c63ff; 
      border-radius: 4px; 
    }
    
    .link { 
      width: 70px; 
      height: 10px; 
      background: #ff6584; 
      border-radius: 4px; 
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"></div>
    <div class="links-group">
      <div class="link"></div>
      <div class="link"></div>
      <div class="link"></div>
      <div class="link"></div>
    </div>
  </nav>
</body>
</html>
