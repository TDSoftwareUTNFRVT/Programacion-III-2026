<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
    }

    .app { 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
    }

    .app-header {
      height: 60px;
      background: #6c63ff;
      flex-shrink: 0;
    }

    .app-body {
      display: flex;
      flex-direction: column; 
      flex: 1;
      min-height: calc(100vh - 60px);
    }

    .app-sidebar {
      display: none;    
      background: #1c2235;
    }

    .app-main {
      flex: 1;
      background: #161b27;
      min-height: 400px;
    }


    @media (min-width: 768px) {
      .app-body {
        flex-direction: row;  
      }
      
      .app-sidebar {
        display: block;        
        flex: 0 0 220px;     
      }
    }

    .app-header {
      display: flex;
      align-items: center;
      padding: 0 24px;
      color: white;
      font-weight: bold;
    }

    .app-sidebar {
      padding: 20px;
      color: white;
    }

    .app-main {
      padding: 20px;
      color: white;
    }

    .app-header::after {
      content: "";
    }

    .app-sidebar::after {
      content: "";
      display: block;
    }

    .app-main::after {
      content: "";
      display: block;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header"></header>
    <div class="app-body">
      <aside class="app-sidebar"></aside>
      <main class="app-main"></main>
    </div>
  </div>
</body>
</html>
