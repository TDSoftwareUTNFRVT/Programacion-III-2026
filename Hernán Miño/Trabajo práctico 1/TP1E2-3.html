<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
    }

    .auto-grid {
      display: flex;
      flex-wrap: wrap;     
      gap: 16px;          
      padding: 20px;       
    }


    .card {
      flex: 1 1 220px;    
      min-height: 160px;   
      border-radius: 8px; 
    }

    .c1 { background: #6c63ff; }
    .c2 { background: #ff6584; }
    .c3 { background: #22c55e; }
    .c4 { background: #f59e0b; }
    .c5 { background: #06b6d4; }
    .c6 { background: #ec4899; }
    .c7 { background: #a78bfa; }
    .c8 { background: #fb923c; }
    .card {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="auto-grid">
    <div class="card c1"></div>
    <div class="card c2"></div>
    <div class="card c3"></div>
    <div class="card c4"></div>
    <div class="card c5"></div>
    <div class="card c6"></div>
    <div class="card c7"></div>
    <div class="card c8"></div>
  </div>
</body>
</html>
