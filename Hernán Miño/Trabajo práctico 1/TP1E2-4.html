<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f1219;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .demo {
      max-width: 900px;
      width: 100%;
      background: #1a1f2e;
      border-radius: 16px;
      padding: 1.5rem;
    }

    .two-columns {
      display: flex;
      gap: 1.5rem;
    }

    .slot-narrow { 
      container-type: inline-size; 
      width: 180px; 
    }

    .slot-wide { 
      container-type: inline-size; 
      flex: 1; 
    }

    .feat-card {
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: hidden;
      background: #0f1219;
    }

    .feat-thumb { 
      height: 100px; 
      background: #6c63ff; 
    }

    .feat-body { 
      flex: 1; 
      min-height: 60px; 
      background: #232a3e;
    }

    @container (min-width: 380px) {
      .feat-card {
        flex-direction: row;
      }
      
      .feat-thumb { 
        width: 140px; 
        height: auto; 
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>
  <div class="demo">
    <div class="two-columns">
      <div class="slot-narrow">
        <div class="feat-card">
          <div class="feat-thumb"></div>
          <div class="feat-body"></div>
        </div>
      </div>

      <div class="slot-wide">
        <div class="feat-card">
          <div class="feat-thumb"></div>
          <div class="feat-body"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
