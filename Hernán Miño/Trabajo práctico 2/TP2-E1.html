<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      font-family: monospace;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      min-height: 100vh;
    }

    .caja {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .caja-1 { background-color: #e63946; }
    .caja-2 { background-color: #457b9d; }
    .caja-3 { background-color: #2a9d8f; }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="caja caja-1">1</div>
    <div class="caja caja-2">2</div>
    <div class="caja caja-3">3</div>
  </div>
</body>
</html>
