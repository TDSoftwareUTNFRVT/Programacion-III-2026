<!DOCTYPE html>
<html lang="es">
<head>
    <title>Estilo2</title>
    <style>
        .btn-op {
            background: linear-gradient(45deg, red, white);
            width: 200px;
            height: 50px;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: background 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
        }

        .btn-op:hover {
            background: linear-gradient(45deg, white, red);
        }
    </style>
</head>
<body>
    <button class="btn-op">CLICK</button>
</body>
</html>
