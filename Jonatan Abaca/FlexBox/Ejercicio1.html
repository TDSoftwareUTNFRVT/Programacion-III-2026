<!DOCTYPE html>
<html lang="es">
<head>
    <title>Ejercicio1</title>
    <style>
            /* === CONTENEDOR FLEX === */
        .contenedor {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        min-height: 100vh;
        background-color: #f5f5f5;
        }

        /* === CADA CAJA === */
        .caja {
        width: 100px;
        height: 100px;
        border-radius: 8px;
        display: flex;          /* Flex también en el item */
        justify-content: center;
        align-items: center;
        color: #fff;
        font-size: 1.5rem;
        font-weight: bold;
        }

        .caja-1 { background-color: #e63946; }
        .caja-2 { background-color: #457b9d; }
        .caja-3 { background-color: #2a9d8f; }
    </style>
</head>
<body>
    <div class="contenedor">
    <div class="caja caja-1">1</div>
    <div class="caja caja-2">2</div>
    <div class="caja caja-3">3</div>
  </div>
</body>
</html>
