<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1</title>
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .wrapper {
      display: flow-root;
      width: 100%;
    }

    .sidebar {
      float: left;
      width: 28%;
      margin-right: 2%;
      height: 400px;
      background: #6c63ff;
    }

    .main {
      float: left;
      width: 70%;
      height: 400px;
      background: #1c2235;
    }

  </style>
</head>
<body>

  <div class="wrapper">
    <div class="sidebar"></div>
    <div class="main"></div>
  </div>

</body>
</html>
