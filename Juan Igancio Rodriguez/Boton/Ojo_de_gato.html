    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #2c3e50;
            margin: 0;
            font-family: sans-serif;
        }

        .ojo-boton {
            position: relative;
            display: inline-block;
            cursor: pointer;
            user-select: none;
        }

        #toggle-ojo {
            display: none;
        }

        .ojo {
            display: block;
            width: 160px;
            height: 90px;
            background: radial-gradient(circle at 50% 45%, #fff 70%, #e0d6c8);
            border-radius: 50%;
            transform: rotate(-5deg);
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 8px #3a2e25,
                inset 0 0 20px rgba(0,0,0,0.15);
            transition: box-shadow 0.3s;
        }

        .iris {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            background: radial-gradient(circle at 35% 35%, #c5e17a, #6b8e23 65%, #111);
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
            z-index: 2;
        }

        .pupila {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 28px;
            background: #000;
            border-radius: 5px;
            box-shadow: 0 0 8px rgba(0,0,0,0.9);
        }

        .brillo {
            position: absolute;
            background: white;
            border-radius: 50%;
            z-index: 3;
            opacity: 0.9;
        }
        .brillo-1 {
            width: 12px;
            height: 12px;
            top: 18%;
            left: 25%;
        }
        .brillo-2 {
            width: 7px;
            height: 7px;
            top: 38%;
            left: 65%;
            opacity: 0.6;
        }

        .parpado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #d5a87c; 
            border-radius: 50%;
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
        }

        
        .parpado::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 15%;
            width: 70%;
            height: 3px;
            background: #1a1008;
            border-radius: 1px;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }

        #toggle-ojo:checked + .ojo .parpado {
            transform: scaleY(1);
        }

        #toggle-ojo:checked + .ojo .parpado::after {
            opacity: 1;
        }

        .ojo:active {
            transform: rotate(-5deg) scale(0.97);
        }
    </style>
</head>
<body>
    <div class="ojo-boton">
        
        <input type="checkbox" id="toggle-ojo">

        
        <label for="toggle-ojo" class="ojo">
            
            <div class="iris">
                <div class="pupila"></div>
                <div class="brillo brillo-1"></div>
                <div class="brillo brillo-2"></div>
            </div>

            <div class="parpado"></div>
        </label>
    </div>
</body>
</html>
