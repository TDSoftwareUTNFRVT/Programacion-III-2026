<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia App</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="contenedor">
    <header>
      <h1>Trivia App</h1>
    </header>

    <div id="pantalla-inicio" class="pantalla visible">
      <div class="controles">
        <label for="categoria">Categoría:</label>
        <select id="categoria">
          <option value="">Cualquiera</option>
        </select>

        <label for="dificultad">Dificultad:</label>
        <select id="dificultad">
          <option value="easy">Fácil</option>
          <option value="medium" selected>Medio</option>
          <option value="hard">Difícil</option>
        </select>

        <label for="cantidad">Cantidad de preguntas:</label>
        <select id="cantidad">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="15">15</option>
          <option value="20">20</option>
        </select>
      </div>
      <button id="btn-jugar">Jugar</button>
      <div id="mensaje-cargando" class="oculto">Cargando preguntas…</div>
      <div id="mensaje-error" class="error oculto">
        <span id="texto-error"></span>
        <button id="btn-reintentar" class="oculto">Reintentar</button>
      </div>
    </div>

    <div id="pantalla-juego" class="pantalla">
      <div class="info-partida">
        <span id="puntaje-actual">Puntaje: 0</span>
        <span id="progreso"></span>
      </div>
      <h2 id="texto-pregunta"></h2>
      <div id="opciones" class="opciones"></div>
      <div id="feedback" class="feedback oculto"></div>
      <button id="btn-siguiente" class="oculto">Siguiente</button>
    </div>

    <div id="pantalla-fin" class="pantalla">
      <h2>¡Partida terminada!</h2>
      <p id="puntaje-final"></p>
      <div id="historial" class="historial oculto">
        <h3>Historial de partidas</h3>
        <ul id="lista-historial"></ul>
      </div>
      <button id="btn-volver-jugar">Volver a jugar</button>
    </div>
  </div>

  <script src="js/TriviaAPI.js"></script>
  <script src="js/TriviaGame.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
