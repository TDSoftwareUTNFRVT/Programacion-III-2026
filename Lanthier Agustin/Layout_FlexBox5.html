<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Flexbox</title>
    <link rel="stylesheet" href="styles_flexbox.css">
</head>
<body>
    <div class = "dashboard">
        <div class = "dash-header">
            <div class = "logo-block"></div>
            <div class = "controls">
                <div class = "ctrl"></div>
                <div class = "ctrl"></div>
                <div class = "ctrl"></div>
            </div>
        </div>
        <div class = "dash-body">
            <div class = "dash-sidebar">
                <div class = "sb-item-active"></div>
                <div class = "sb-item"></div>
                <div class = "sb-item"></div>
                <div class = "sb-item"></div>
            </div>
            <div class = "dash-main">
                <div class = "metrics">
                    <div class = "metric m1"></div>
                    <div class = "metric m2"></div>
                    <div class = "metric m3"></div>
                </div>
                <div class = "panels">
                    <div class = "panel-main"></div>
                    <div class = "panel-side"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
