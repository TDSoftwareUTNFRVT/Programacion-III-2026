<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De nada pibe...</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header>
    <h1>Todos tus juegos aca!</h1>
    <input type="text" id="inputBusqueda" placeholder="Buscar juego..." />
    <button id="botonBuscar">Buscar</button>
  </header>

  <div id="banner">
    <div id="bannerContenido">
      <h2 id="bannerNombre"></h2>
      <div id="bannerEstrellas"></div>
      <p id="bannerDescripcion"></p>
      <button id="bannerBoton">Ver detalles</button>
    </div>
    <div id="bannerOverlay"></div>
  </div>

  <main id="contenido">
  </main>

  <div id="infoJuego">
    <div id="detalleJuego">
      <button id="botonCerrar">✕</button>
      <img id="imagenJuego" src="" alt="" />
      <h2 id="nombreJuego"></h2>
      <div id="info"></div>
    </div>
  </div>

  <div id="cargando" class="oculto">Cargando...</div>

  <script src="main.js"></script>
</body>

</html>
