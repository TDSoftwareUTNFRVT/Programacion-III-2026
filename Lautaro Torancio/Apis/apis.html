<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ropa</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }
    #cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 200px;
      text-align: center;
      padding: 15px;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .card img {
      max-width: 100%;
      height: 150px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .card h3 {
      font-size: 14px;
      color: #333;
      margin: 10px 0;
      min-height: 40px;
      font-weight: normal;
    }
    .card strong {
      color: #000;
      font-size: 16px;
    }
    .card:hover {
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      border-color: #770664; 
    }
  </style>
</head>
<body>
  <div id="cards"></div>
  <script>
    async function mostrarRopa() {
      const url = "https://fakestoreapi.com/products/category/women's clothing";
      const response = await fetch(url);
      const data = await response.json();

      const prendas = data.slice(0, 4);
      const container = document.getElementById('cards');

      container.innerHTML = prendas
        .map(p => `
          <div class="card">
            <img src="${p.image}" alt="${p.title}">
            <h3>${p.title}</h3>
            <strong>$${p.price}</strong>
          </div>
        `)
        .join('');
    }
    mostrarRopa();
  </script>
</body>
</html>
