<!doctype html>
<html lang="es">
    <head>
        <style>
            .col       {float: left; height: 300px;}
            .col-20    {width: 20%;}
            .col-60    {width: 60%;}
            .bg-violeta {background: #6c63ff;}
            .bg-dark   {background: #161b27;}
            .bg-red    {background: #ff6584;}
            .bg-darker {background: #232a3e;}
            .bg-black  {background: #0e1117;}
            .height-full{height: 60px; display: block;}
            .clear     {clear: both;}
            .cis {display: flow-root;}
        </style>
    </head>
        <body>
            <div class = "height-full bg-darker"> </div>
            <div class = "cis"> 
                <div class = "col col-20 bg-violeta"></div>
                <div class = "col col-60 bg-dark"></div>
                <div class = "col col-20 bg-red"></div>
            </div>
            <div class = "height-full bg-black clear"></div>
        </body>
</html>
