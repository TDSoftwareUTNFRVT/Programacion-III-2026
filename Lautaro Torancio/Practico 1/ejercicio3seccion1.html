<!doctype html>
<html lang="es">
    <head>
        <style>
            .contenedor{font-size: 0;display: block;}
            .card{display: inline-block; width: 31.33%; margin: 1%; vertical-align: top;
                height: 140px;
                border-radius: 8px;
            }
            .bg-yellow{background-color: yellow;}
            .bg-green{background-color: greenyellow;}
            .bg-blue{background-color:blue}
            .bg-violet{background-color: blueviolet;}
            .bg-orange{background-color: orangered;}
            .bg-red{background-color: red;}
        </style>
    </head>
        <body>
            <div class = "contenedor">
                <div class = "card bg-yellow"></div>
                <div class = "card bg-green"></div>
                <div class = "card bg-blue"></div>
                <div class = "card bg-violet"></div>
                <div class = "card bg-orange"></div>
                <div class = "card bg-red"></div>
            </div>
        </body>
</html>
