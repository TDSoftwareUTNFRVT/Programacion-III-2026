<!doctype html>
<html lang="es">
    <head>
        <style>
            .navbar{
                display:flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                padding: 16px 24px;
                background: #161b27;
                
            }
            .grupos-links{
                display: flex;
                gap:12px;
                flex-wrap: wrap;
                justify-content: center;
            }
            @media(min-width: 768px){
                .navbar{
                    flex-direction: row;
                    align-items: center;
                    justify-content: space-between;
                }
                .grupos-links{
                    justify-content: flex-end;
                }
            }
            .logo{ width: 48px; height: 32px; background: #6c63ff; border-radius: 4px;}
            .link  { width: 70px; height: 10px; background: #ff6584; border-radius: 4px;}
        </style>
    </head>
    <body>
        <div class = "navbar">
            <div class="logo"></div>
            <div class ="grupo links"></div>
                <div class = "link"></div>
                <div class = "link"></div>
                <div class = "link"></div>
            </div>
        </div>
    </body>
</html>
