<!doctype html>
<html lang="es">
    <head>
        <style>
            .navbar {
                display: flex;
                justify-content: space-between; /* ← Clave */
                align-items: center;
                padding: 16px 32px;
                background-color: #16213e;
            }
            .logo {
                font-size: 1.4rem;
                font-weight: bold;
                color: #f0e040;
            }
            .nav-links {
                display: flex;      
                list-style: none;
                gap: 24px;
            }
            .nav-links a {
                text-decoration: none;
                color: #aaa;
                font-size: 0.9rem; /* unidad de medidda para que la fuente se adapte al html*/
                transition: color 0.2s;
            }
            .nav-links a:hover { color: #fff; }
            .btn-contacto {
                background: #f0e040;
                color: #000;
                border: none;
                padding: 8px 18px;
                border-radius: 4px;
                font-weight: bold;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">MiSitio</div>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li> /*list items*/
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Servicios</a></li>
            </ul>
            <button class="btn-contacto">Contacto</button>
        </nav>
    </body>
