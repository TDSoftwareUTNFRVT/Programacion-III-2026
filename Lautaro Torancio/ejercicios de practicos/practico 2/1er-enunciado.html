<!doctype html>
<html lang="es">
    <head>
        <style>
        .contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .caja {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            display: flex;          
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .c-1 { background-color: #e63946;}
        .c-2 { background-color: #457b9d;}
        .c-3 { background-color: #2a9d8f;}
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="caja c-1">1</div>
            <div class="caja c-2">2</div>
            <div class="caja c-3">3</div>
        </div>
    </body>
</html>
