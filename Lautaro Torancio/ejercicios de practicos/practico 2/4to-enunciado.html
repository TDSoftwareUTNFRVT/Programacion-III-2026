<!doctype html>
<html lang="es">
    <head>
        <style>
            .wrapper {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .hero {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                min-height: 200px;
                gap: 16px;
                background: #0f172a;
            }

            .features {
                display: flex;
                flex-wrap: wrap;   
                gap: 16px;
                padding: 24px;
                flex-grow: 1;      
            }

            .feature-item {
                flex-basis: calc(33.33% - 11px); 
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                padding: 20px;
                background: #1e293b;
                border-radius: 8px;
            }

            .feature-item:first-child {
                order: 2;
            }

            .site-footer {
                display: flex;
                justify-content: space-between;
                padding: 16px 24px;
                background: #0a0f1e;
            }
        </style>
    </head>
<body>
    <div class="wrapper">
    
        <div class="hero">
            <h1 style="color: #fff;">Bienvenido a la Plataforma</h1>
            <p style="color: #ccc;">Explora nuestras características destacadas</p>
        </div>

        <div class="features">
            <div class="feature-item">
                <h2 style="color: #fff;">Velocidad</h2>
                <p style="color: #ccc;">Carga rápida y optimizada.</p>
            </div>
            <div class="feature-item">
                <h2 style="color: #fff;">Seguridad</h2>
                <p style="color: #ccc;">Protección avanzada de datos.</p>
            </div>
            <div class="feature-item">
                <h2 style="color: #fff;">Flexibilidad</h2>
                <p style="color: #ccc;">Diseño adaptable a cualquier dispositivo.</p>
            </div>
        </div>

        <div class="site-footer">
            <span style="color: #ccc;">© 2026 Mi Sitio</span>
            <span style="color: #ccc;">Contacto: info@misitio.com</span>
        </div>
    </div>
</body>
</html>
