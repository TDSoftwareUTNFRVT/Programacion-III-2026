<!doctype html>
<html lang="es">
    <head>
        <style>
            .dashboard {
                display: flex;
                min-height: 100vh;
            }

            .sidebar {
                width: 240px;
                flex-shrink: 0;     
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 20px 16px;
                background: #1a1a2e;
            }

            .nav-item {
                padding: 10px 14px;
                border-radius: 6px;
                color: #888;
                text-decoration: none;
                font-size: 0.9rem;
            }
            .nav-item.active {
                background: #f0e040;
                color: #000;
                font-weight: bold;
            }

            .contenido {
                flex: 1;              
                display: flex;
                flex-direction: column;
                gap: 20px;
                padding: 24px;
            }

            .contenido-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .stats-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 16px;
            }

            .stat-card {
                flex-basis: calc(50% - 8px); 
                padding: 24px;
                background: #fff;
                border-radius: 10px;
                border: 1px solid #eee;
            }

            /* Desafío extra: item a ancho completo */
            .stat-card.full {
                flex-basis: 100%;
            }
        </style>
    </head>
<body>
    <div class="dashboard">

        <div class="sidebar">
            <a href="#" class="nav-item active">Inicio</a>
            <a href="#" class="nav-item">Estadísticas</a>
            <a href="#" class="nav-item">Usuarios</a>
            <a href="#" class="nav-item">Configuración</a>
        </div>

        <div class="contenido">
        
            <div class="contenido-header">
                <h1>Panel de Control</h1>
                <button>Acción rápida</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h2>Usuarios activos</h2>
                    <p>120</p>
                </div>
                <div class="stat-card">
                    <h2>Ventas</h2>
                    <p>$ 45.000</p>
                </div>
                <div class="stat-card full">
                    <h2>Resumen mensual</h2>
                    <p>Este mes se alcanzó un 20% más de actividad que el anterior.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
