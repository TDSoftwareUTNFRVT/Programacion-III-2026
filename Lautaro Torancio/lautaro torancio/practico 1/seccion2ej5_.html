<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        /* ESTRUCTURA BASE */
        .dashboard {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .dash-header {
            height: 64px;
            background: #6c63ff;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .dash-body {
            display: flex;
            flex: 1;
        }
        .dash-sidebar {
            display: none;
            flex: 0 0 220px;
            background: #1c2235;
            padding: 12px;
            gap: 6px;
            flex-direction: column;
        }
        .dash-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
            background: #161b27;
        }
        .dash-footer {
            height: 48px;
            background: #0a0d14;
            flex-shrink: 0;
        }

        /* HEADERS INTERNOS */
        .logo-block {
            width: 48px;
            height: 28px;
            background: rgba(255,255,255,.3);
            border-radius: 4px;
        }
        .controls {
            display: flex;
            gap: 8px;
        }
        .ctrl {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,.2);
            border-radius: 50%;
        }

        /* SIDEBAR ITEMS */
        .sb-item {
            height: 40px;
            border-radius: 6px;
            background: #232a3e;
        }
        .sb-item.active {
            background: #6c63ff;
        }

        /* METRICAS */
        .metrics {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .metric {
            flex: 1 1 160px;
            height: 80px;
            border-radius: 8px;
        }
        .m1 { background:#6c63ff } 
        .m2 { background:#ff6584 } 
        .m3 { background:#22c55e }

        /* PANELS */
        .panels {
            display: flex;
            gap: 12px;
            flex: 1;
            flex-wrap: wrap;
        }
        .panel-main {
            flex: 2 1 300px;
            min-height: 240px;
            background:#1c2235;
            border-radius: 8px;
        }
        .panel-side {
            flex: 1 1 200px;
            min-height: 240px;
            background: #232a3e;
            border-radius: 8px;
        }

        @media (min-width: 768px){
            .dash-sidebar {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        /*HEADER*/
        <div class="dash-header">
            <div class="logo-block"></div>
            <div class="controls">
                <div class="ctrl"></div>
                <div class="ctrl"></div>
            </div>
        </div>

        /*BODY*/
        <div class="dash-body">
            /*SIDEBAR*/
            <div class="dash-sidebar">
                <div class="sb-item active"></div>
                <div class="sb-item"></div>
                <div class="sb-item"></div>
            </div>

            /*MAIN*/
            <div class="dash-main">
                /*METRICAS*/
                <div class="metrics">
                    <div class="metric m1"></div>
                    <div class="metric m2"></div>
                    <div class="metric m3"></div>
                </div>

                /*PANELS*/
                <div class="panels">
                    <div class="panel-main"></div>
                    <div class="panel-side"></div>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="dash-footer"></div>
    </div>
</body>
</html>
