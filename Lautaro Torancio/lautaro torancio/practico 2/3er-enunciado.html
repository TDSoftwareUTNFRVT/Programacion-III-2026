<!doctype html>
<html lang="es">
    <head>
        <style>
            .grilla {
                display: flex;
                gap: 20px;
                padding: 24px;
                background: #fafafa;
            }

            .tarjeta {
                flex: 1;           
                display: flex;
                flex-direction: column; 
                gap: 12px;
                background: #fff;
                border-radius: 12px;
                padding: 16px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            }

            .tarjeta-img {
                height: 120px;
                border-radius: 8px;
                background: linear-gradient(135deg, #667eea, #764ba2);
            }

            .tarjeta-titulo {
                font-weight: bold;
                font-size: 1rem;
            }

            .tarjeta-texto {
                flex-grow: 1; /* empuja la etiqueta abajo */
                color: #666;
                font-size: 0.85rem;
            }

            .tarjeta-etiqueta {
                align-self: flex-start;
                background: #f0e040;
                color: #000;
                padding: 4px 12px;
                border-radius: 99px;
                font-size: 0.75rem;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="grilla">
        
        <div class="tarjeta">
            <div class="tarjeta-img"></div>
            <div class="tarjeta-titulo">Curso de Python</div>
            <div class="tarjeta-texto">
                
            </div>
            <div class="tarjeta-etiqueta">Nuevo</div>
        </div>
        
        <div class="tarjeta">
            <div class="tarjeta-img"></div>
            <div class="tarjeta-titulo">Bases de Datos</div>
            <div class="tarjeta-texto">
                
            </div>
            <div class="tarjeta-etiqueta">Popular</div>
        </div>

        <div class="tarjeta">
            <div class="tarjeta-img"></div>
            <div class="tarjeta-titulo">Algoritmos Avanzados</div>
            <div class="tarjeta-texto">
                
            </div>
            <div class="tarjeta-etiqueta">Avanzado</div>
        </div>
    </div>
    </body>
</html>
