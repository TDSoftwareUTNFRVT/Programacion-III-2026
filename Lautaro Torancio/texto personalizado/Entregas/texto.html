<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel estilos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="contenedor">
        <!-- Panel de estilos -->
        <div class="panel-estilos">
            <div class="grupo-estilo">
                <h3>Fondo</h3>
                <div class="opcion" data-tipo="fondo" data-clase="fondo-rosa">Rosa</div>
                <div class="opcion" data-tipo="fondo" data-clase="fondo-azul">Azul</div>
                <div class="opcion" data-tipo="fondo" data-clase="fondo-verde">Verde</div>
                <div class="opcion" data-tipo="fondo" data-clase="fondo-gris">Gris</div>
            </div>

            <div class="grupo-estilo">
                <h3>Color</h3>
                <div class="opcion" data-tipo="color" data-clase="color-rojo">Rojo</div>
                <div class="opcion" data-tipo="color" data-clase="color-violeta">Violeta</div>
                <div class="opcion" data-tipo="color" data-clase="color-gris">Gris</div>
                <div class="opcion" data-tipo="color" data-clase="color-azul">Azul</div>
            </div>

            <div class="grupo-estilo">
                <h3>Degradado</h3>
                <div class="opcion" data-tipo="degradado" data-clase="degradado-calido">Cálido</div>
                <div class="opcion" data-tipo="degradado" data-clase="degradado-frio">Frío</div>
            </div>

            <div class="grupo-estilo">
                <h3>Sombra</h3>
                <div class="opcion" data-tipo="sombra" data-clase="sombra-suave">Suave</div>
                <div class="opcion" data-tipo="sombra" data-clase="sombra-fuerte">Fuerte</div>
            </div>

            <div class="grupo-estilo">
                <h3>Borde</h3>
                <div class="opcion" data-tipo="borde" data-clase="borde-negro">Negro</div>
                <div class="opcion" data-tipo="borde" data-clase="borde-blanco">Blanco</div>
            </div>
        </div>

        <!-- Texto y reset -->
        <div class="contenido">
            <div id="reset" class="opcion">Resetear estilo</div>
            <h1 id="texto">Texto personalizable</h1>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
