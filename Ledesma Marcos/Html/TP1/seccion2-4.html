<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <style>
    /* Contenedores */
    .slot-narrow {
      container-type: inline-size;
      width: 180px;
    }

    .slot-wide {
      container-type: inline-size;
      flex: 1;
    }

    /* Componente card — estilos base (angosto) */
    .feat-card {
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: hidden;
    }

    .feat-thumb {
      height: 100px;
      background: #6c63ff;
    }

    .feat-body {
      flex: 1;
      min-height: 60px;
      background: #232a3e;
    }

    @container (min-width: 380px) {
      .feat-card {
        flex-direction: row;
      }

      .feat-thumb {
        width: 140px;
        height: auto;
        flex-shrink: 0;
      }
    }

    body {
      background: #39435e;
      min-height: 100vh;
    }
  </style>
  <!-- Contenedor angosto -->
  <div class="slot-narrow">
    <div class="feat-card">
      <div class="feat-thumb"></div>
      <div class="feat-body"></div>
    </div>
  </div>

  <!-- Contenedor ancho -->
  <div class="slot-wide">
    <div class="feat-card">
      <div class="feat-thumb"></div>
      <div class="feat-body"></div>
    </div>
  </div>

</body>
</html>
