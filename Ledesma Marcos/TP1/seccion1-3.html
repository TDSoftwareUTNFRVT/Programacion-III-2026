<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <style>
   .grid-cards {
      font-size: 0;
    }

    .card {
      display: inline-block;
      /* TODO: width 31.33%, margin 1%, height 140px, vertical-align top */
      width: 31.33%; height: 140px;
      margin: 1%;
      vertical-align: top;
      border-radius: 8px;
      font-size: 16px;
      /* restaurar font-size para contenido interno */
    }

    .bg-violet {
      background: #6c63ff;
    }

    .bg-red {
      background: #ff6584;
    }

    .bg-green {
      background: #22c55e;
    }

    .bg-yellow {
      background: #f59e0b;
    }

    .bg-cyan {
      background: #06b6d4;
    }

    .bg-pink {
      background: #ec4899;
    }
    body {
      background: #232a3e;
      min-height: 100vh;
    }
  </style>

<div class="grid-cards">
  <div class="card bg-violet">violeta</div>
  <div class="card bg-red">rojo</div>
  <div class="card bg-green">verde</div>
  <div class="card bg-yellow">amarillo</div>
  <div class="card bg-cyan">cian</div>
  <div class="card bg-pink">rosa</div>
</div>

</html>
