<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <style>
    body {
      background: #232a3e;
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: #1b1b27;
    }

    .links-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    @media (min-width: 768px) {
      .navbar {
        flex-direction: row;
        justify-content: space-between;
      }

      .links-group {
        justify-content: flex-end;
      }
    }

    .logo {
      width: 48px;
      height: 32px;
      background: #6c63ff;
      border-radius: 4px;
    }

    .link {
      width: 70px;
      height: 10px;
      background: #ff6584;
      border-radius: 4px;
    }
    
  </style>
  <nav class="navbar">
    <div class="logo"></div>
    <div class="links-group">
      <div class="link"></div>
      <div class="link"></div>
      <div class="link"></div>
    </div>
  </nav>
</body>

</html>
