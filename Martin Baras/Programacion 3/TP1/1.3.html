<!-- <> -->
 <html>
    <head>
        <title>Cards con inline-block</title>
        <style>
            body{background-color: #0e1117;}
            .contenedor{font-size:0;}
            .tarjeta{display:inline-block;width:31.33%;margin:1%;vertical-align:top;height:140px;border-radius: 8px;}
            .bg-red{background-color: brown;}
            .bg-green{background-color:chartreuse;}
            .bg-blue{background-color: blue;}
            .bg-pink{background-color: pink;}
            .bg-purple{background-color: purple;}
            .bg-yellow{background-color: yellow;}
            
        </style>
    </head>
    <body>
        <section class="contenedor">
            <div class="tarjeta bg-red"></div>
            <div class="tarjeta bg-green"></div>
            <div class="tarjeta bg-blue"></div>
            <div class="tarjeta bg-pink"></div>
            <div class="tarjeta bg-purple"></div>
            <div class="tarjeta bg-yellow"></div>
        </section>
    </body>
 </html>
