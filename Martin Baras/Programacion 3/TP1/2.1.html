<!-- <> -->
 <html>
    <head>
        <title>Navbar responsiva con flexbox + media query</title>
        <meta name="viewport" content="width=device-width">
        <style>
            *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            }
            .caja-logo{width:48px;height:32px;background-color: rgb(108, 108, 233);border-radius: 8px;}
            .caja-link{width:70px;height:10px;background-color: rgb(223, 113, 113);border-radius: 8px;}
            .section-logo{
                width:100vw;
                height:200px;
                display:flex;
                flex-direction:row;
                align-items: center;
                justify-content: center;
            }
            .section-links{
                width:100vw;
                height:200px;
                display:flex;
                flex-direction:column;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }
            .navbar{
                width:100vw;
                height:100vh;
                display:flex;
                flex-direction:column;
                align-items: center;
                justify-content: center;
                padding: 16px 24px;
                background-color: #161b27
            }
            @media (min-width: 768px){
                .section-logo{
                    flex-direction:row;
                    justify-content: flex-start;
                }
                .section-links{
                    flex-direction:row;
                    justify-content: flex-end;
                }
                .navbar{
                    flex-direction:row;
                }
            }
        </style>
    </head>
    <body>
        <section class="navbar">
            <div class="section-logo">
                <div class="caja-logo"></div>
            </div>
            <div class="section-links">
                <div class="caja-link"></div>
                <div class="caja-link"></div>
                <div class="caja-link"></div>
                <div class="caja-link"></div>
            </div>
        </section>
    </body>
 </html>
