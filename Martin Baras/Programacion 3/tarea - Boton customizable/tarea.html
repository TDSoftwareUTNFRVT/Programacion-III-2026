<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Tarea</title>
    <link rel="stylesheet" href="tarea.css">
    <script src="tarea.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">


</head>
<body>
    <section class="main flex flex-row">
        <div class="div-colores border flex flex-row gap1 wrap">
            <button class="caja-color bg-red    " type="button"></button>
            <button class="caja-color bg-rose   " type="button"></button>
            <button class="caja-color bg-orange " type="button"></button>
            <button class="caja-color bg-lime   " type="button"></button>
            <button class="caja-color bg-green  " type="button"></button>
            <button class="caja-color bg-emerald" type="button"></button>
            <button class="caja-color bg-teal   " type="button"></button>
            <button class="caja-color bg-cyan   " type="button"></button>
            <button class="caja-color bg-lblue  " type="button"></button>
            <button class="caja-color bg-blue   " type="button"></button>
            <button class="caja-color bg-indigo " type="button"></button>
            <button class="caja-color bg-violet " type="button"></button>
            <button class="caja-color bg-purple " type="button"></button>
            <button class="caja-color bg-fuchsia" type="button"></button>
            <button class="caja-color bg-pink   " type="button"></button>
        </div>

        <div class="div-box-shadow border flex flex-row gap1 wrap box-shadow">
            <button class="caja-color-bs bs-red     bg-red" type="button"></button>
            <button class="caja-color-bs bs-rose    bg-rose" type="button"></button>
            <button class="caja-color-bs bs-orange  bg-orange" type="button"></button>
            <button class="caja-color-bs bs-lime    bg-lime" type="button"></button>
            <button class="caja-color-bs bs-green   bg-green" type="button"></button>
            <button class="caja-color-bs bs-emerald bg-emerald" type="button"></button>
            <button class="caja-color-bs bs-teal    bg-teal" type="button"></button>
            <button class="caja-color-bs bs-cyan    bg-cyan" type="button"></button>
            <button class="caja-color-bs bs-lblue   bg-lblue" type="button"></button>
            <button class="caja-color-bs bs-blue    bg-blue" type="button"></button>
            <button class="caja-color-bs bs-indigo  bg-indigo" type="button"></button>
            <button class="caja-color-bs bs-violet  bg-violet" type="button"></button>
            <button class="caja-color-bs bs-purple  bg-purple" type="button"></button>
            <button class="caja-color-bs bs-fuchsia bg-fuchsia" type="button"></button>
            <button class="caja-color-bs bs-pink    bg-pink" type="button"></button>
        </div>


        <div class="div-formulario border flex flex-col gap10 align-items-center jc-center">
            <button class="editable-button text-font" id="editable-button" type="button">Editame</button>
            <input type="text" placeholder="Escribe algo..." id="input-box">
            <button class="submit-button text-font" id="submit-button" type="submit">Submit</button>
        </div>
    </section>
    
</body>
</html>
