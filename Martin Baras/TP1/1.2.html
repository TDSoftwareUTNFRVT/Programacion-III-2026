<!-- <> -->
 <html>
    <head>
        <title>Holy Grail Layout</title>
        <style>
            .contenedor{display:flow-root;}
            .header-footer{display:block;clear:both;width:100%;height:60px;}
            .bg-gris{background-color: #4a4b4e;}
            .bg-azul{background-color:#6c63ff ;}
            .bg-gris-oscuro{background-color:#161b27 ;}
            .bg-rojo{background-color:#ff6584;}
            .bg-negro{background-color: black;}
            .izq-der{float:left;width:20%;height:300px}
            .med{float:left;width:60%;height:300px}

        </style>
    </head>
    <body>
        <section class="header-footer bg-gris"></section>
        <section class="contenedor">
            <div class="izq-der bg-azul"></div>
            <div class="med bg-gris-oscuro"></div>
            <div class="izq-der bg-rojo"></div>
        </section>
        <section class="header-footer bg-negro"></section>
    </body>
 </html>
