<!-- <> -->
<html>
    <head>
        <title>Sidebar + main responsivos</title>
        <meta name="viewport" content="width=device-width">
        <style>
            *, *::before, *::after {box-sizing:border-box;margin:0;padding:0;}
            .app{width:100vw;height:100vh;display:flex;flex-direction:column;}
            .app-header{width:100vw;height:10vh;}
            .display-content{width:100vw;height:90vh;display:flex;flex-direction:row;}
            .app-content{width:100vw;height:100%;}
            .bg-red{background-color: brown;}
            .bg-black{background-color: rgb(54, 42, 165);}
            .bg-green{background-color: rgb(97, 165, 42);}
            @media (min-width: 768px){.app-sidebar{width:20%;height:100%;}}
        </style>
    </head>
    <body class="app">
        <section class="app-header bg-red">
        </section>
        <section class="display-content">
            <div class="app-sidebar bg-green"></div>
            <div class="app-content bg-black"></div>
        </section>
    </body>
</html>
