<!doctype html>
<html>

<head>
    <title>Mi boton</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <script src="script.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width">

</head>

<body>
    <section class="contenedor">
        <div class="caja-lados"></div>
        <div class="caja-medio neon">
            <div class="cartel neon">DiskotekaCSS</div>
            <div class="caja-botones">
                <button class="boton destello"><p class="texto">Mi boton</p></button>
                <button class="boton destello" id="saludo"><p class="texto">Saludo</p></button>
            </div>
            <div class="caja-cuenta-numerica">
                <button class="boton destello" id="restar"><p class="texto">-</p></button>
                <button class="boton destello"><p class="texto"  id="numero">0</p></button>
                <button class="boton destello" id="sumar"><p class="texto">+</p></button>
                <button class="boton destello" id="reiniciar"><p class="texto">Reset</p></button>
            </div>
        </div>
        <div class="caja-lados"></div>
    </section>

</body>

</html>
