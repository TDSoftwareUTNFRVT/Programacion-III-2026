<!doctype html>
<html>

<head>
    <title>Mi boton</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <script src="script.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width">

</head>

<body>
    <section class="contenedor">
        <div class="caja-lados"></div>
        <div class="caja-medio neon">
            <div class="cartel neon">DiskotekaCSS</div>
            <div class="caja-botones">
                <button class="boton destello">Mi boton</button>
                <button class="boton destello" id="saludo">Saludo</button>
            </div>
            <div class="caja-cuenta-numerica">
                <button class="boton destello" id="restar">-</button>
                <button class="boton destello" id="numero">0</button>
                <button class="boton destello" id="sumar">+</button>
                <button class="boton destello" stylesheet="" id="reiniciar">Reset</button>
            </div>
        </div>
        <div class="caja-lados"></div>
    </section>

</body>

</html>
