<!DOCTYPE html>
<html>
<style>
 
* { box-sizing: border-box; margin: 0; padding: 0; }
 .carta{
    display: inline-block;
    width:31.33% ;
    margin:1% ;
    height:140px;
    border-radius:8px;
    font-size: 16px;
 }
 body {
    font-size: 0; 
}

.violeta { background: #6c63ff; }
.rojo    { background: #ff6584; }
.verde  { background: #22c55e; }
.amarillo { background: #f59e0b; }
.celeste   { background: #06b6d4; }
.rosa   { background: #ec4899; }


</style>
<body>
<div class="carta violeta"></div>
<div class="carta rojo"></div>
<div class="carta verde"></div>
<div class="carta amarillo"></div>
<div class="carta celeste"></div>
<div class="carta rosa"></div>

</body>



</html>
