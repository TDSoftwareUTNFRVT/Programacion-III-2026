<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

.contenedor {
  display: flex;
  flex-direction:row;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  background: #161b27;
}

.links_contenedor {
  display: flex;
  gap: 12px;
  width:100%;
  justify-content: end;
}

.logo  { 
    width: 48px;
    height: 32px;
    background: #6c63ff;
    border-radius: 4px;
    flex-shrink: 0; 
    }

.link { 
    width: 70px;
    height: 10px;
    background: #ff6584;
    border-radius: 4px; 
    }
@media(max-width:425px){
    .contenedor{flex-direction: column;
                align-items: center;
                width: auto;}
    .links_contenedor{flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    width: auto;}
}


</style>

</head>
<body>
<div class="contenedor">
   <div class="logo"></div>
   <div class="links_contenedor">
        <div class="link"></div>
        <div class="link"></div>
        <div class="link"></div>
        <div class="link"></div>
   </div>
</div>
</body>
</html>
