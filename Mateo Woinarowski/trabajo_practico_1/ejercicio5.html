<!DOCTYPE html>
<html>
<head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }


.app { display: flex; flex-direction: column; min-height: 100vh; }

.app-header {
  height: 60px;
  background: #6c63ff;
  flex-shrink: 0;
}

.app-body {
  display: flex;
  flex-direction: column;   
  flex: 1;
  min-height: calc(100vh - 60px); 
  
}

.app-sidebar {
  display: none;         
  background: #1c2235;
  flex-shrink:0 ;
}

.app-main {
  flex: 1;
  background: #161b27;
  min-height: 400px;
}

@media (min-width: 768px) {
  .app-body {
    flex-direction: row; /
  }

  .app-sidebar {
    display: block;
    flex: 0 0 220px;;
  }
}

   
</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="app">
    <div class="app-header"></div>

    <div class="app-body">
        <div class="app-sidebar"></div>
        <div class="app-main"></div>
    </div>
</div>




</body>
</html>
