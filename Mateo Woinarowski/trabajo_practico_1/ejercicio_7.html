<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0f1320;
}


.dashboard {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}


.dash-header {
  height: 64px;
  background: #6c63ff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
}

.logo {
  width: 60px;
  height: 28px;
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
}

.controls {
  display: flex;
  gap: 10px;
}

.ctrl {
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
}


.dash-body {
  display: flex;
  flex: 1;
}

.dash-sidebar {
  display: none;
  flex: 0 0 220px;
  background: #1c2235;
  padding: 12px;
  gap: 6px;
  flex-direction: column;
}

.sb-item {
  height: 40px;
  border-radius: 6px;
}

.sb-item:nth-child(odd) {
  background: #232a3e;
}

.sb-item:nth-child(even) {
  background: #2c3550;
}


.dash-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 20px;
  background: #161b27;
}


.metrics {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.metric {
  flex: 1 1 160px;
  height: 80px;
  border-radius: 8px;
}

.m1 { background: #6c63ff; }
.m2 { background: #ff6584; }
.m3 { background: #22c55e; }


.panels {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.panel-main {
  flex: 2 1 300px;
  height: 240px;
  background: #1c2235;
  border-radius: 8px;
}

.panel-side {
  flex: 1 1 200px;
  height: 240px;
  background: #232a3e;
  border-radius: 8px;
}


.dash-footer {
  height: 48px;
  background: #0a0d14;
  flex-shrink: 0;
}


@media (min-width: 768px) {
  .dash-sidebar {
    display: flex;
  }
}
</style>
</head>

<body>

<div class="dashboard">
  <header class="dash-header">
    <div class="logo"></div>
    <div class="controls">
      <div class="ctrl"></div>
      <div class="ctrl"></div>
      <div class="ctrl"></div>
    </div>
  </header>
  <div class="dash-body">
    <aside class="dash-sidebar">
      <div class="sb-item"></div>
      <div class="sb-item"></div>
      <div class="sb-item"></div>
      <div class="sb-item"></div>
      <div class="sb-item"></div>
      <div class="sb-item"></div>
    </aside>
    <main class="dash-main">
      <div class="metrics">
        <div class="metric m1"></div>
        <div class="metric m2"></div>
        <div class="metric m3"></div>
      </div>
      <div class="panels">
        <div class="panel-main"></div>
        <div class="panel-side"></div>
      </div>
    </main>
  </div>
  <footer class="dash-footer"></footer>

</div>

</body>
</html>
