<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="dashboard">

  <header class="header">
    <div class="logo"></div>

    <div class="header-actions">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
  </header>

  <div class="body">

    <aside class="sidebar">
      <div class="menu-item active"></div>
      <div class="menu-item"></div>
      <div class="menu-item"></div>
      <div class="menu-item"></div>
    </aside>

    <main class="main">

      <div class="top-cards">
        <div class="card purple"></div>
        <div class="card pink"></div>
        <div class="card green"></div>
      </div>

      <div class="bottom-cards">
        <div class="card large"></div>
        <div class="card side"></div>
      </div>

    </main>

  </div>

</div>

</body>
</html>
