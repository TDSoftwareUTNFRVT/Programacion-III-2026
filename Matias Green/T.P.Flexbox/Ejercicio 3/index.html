<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - Tarjetas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="grilla">

    <div class="tarjeta">
        <div class="tarjeta-img"></div>
        <h3 class="tarjeta-titulo">Producto Alpha</h3>
        <p class="tarjeta-texto">
            Descripción breve del producto con algunos detalles importantes.
        </p>
        <span class="tarjeta-etiqueta">Nuevo</span>
    </div>

    <div class="tarjeta">
        <div class="tarjeta-img img2"></div>
        <h3 class="tarjeta-titulo">Producto Beta</h3>
        <p class="tarjeta-texto">
            Otro producto con más información para probar el comportamiento.
        </p>
        <span class="tarjeta-etiqueta">Oferta</span>
    </div>

    <div class="tarjeta">
        <div class="tarjeta-img img3"></div>
        <h3 class="tarjeta-titulo">Producto Gamma</h3>
        <p class="tarjeta-texto">
            Producto destacado de la colección actual.
        </p>
        <span class="tarjeta-etiqueta">Top</span>
    </div>

</div>

</body>
</html>
