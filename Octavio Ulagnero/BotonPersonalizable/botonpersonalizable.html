<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Botones</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="pagina">
        <h1 class="titulo">"editor de botones"</h1>
        
        <div class="contenedor-barras">
            <div class="barravertical">
                <h4>COLORES</h4>
                <div class="opcion color-red" data-color="#ff0000"></div>
                <div class="opcion color-blue" data-color="#0000ff"></div>
                <div class="opcion color-green" data-color="#00ff00"></div>
                <div class="opcion color-yellow" data-color="#ffff00"></div>
                <div class="opcion color-orange" data-color="#ffa500"></div>
                <div class="opcion color-purple" data-color="#800080"></div>
            </div>

            <div class="barravertical">
                <h4>SOMBRAS</h4>
                <div class="opcion shadow-none" data-shadow="none"></div>
                <div class="opcion shadow-light" data-shadow="light"></div>
                <div class="opcion shadow-medium" data-shadow="medium"></div>
                <div class="opcion shadow-heavy" data-shadow="heavy"></div>
            </div>

            <div class="barravertical">
                <h4>BORDE</h4>
                <div class="opcion radius-0" data-radius="0%"></div>
                <div class="opcion radius-10" data-radius="10%"></div>
                <div class="opcion radius-25" data-radius="25%"></div>
                <div class="opcion radius-40" data-radius="40%"></div>
                <div class="opcion radius-50" data-radius="50%"></div>
            </div>

            <div class="barravertical">
                <h4>DEGRADADO</h4>
                <div class="opcion grad-none" data-grad="none" data-angle="0"></div>
                <div class="opcion grad-45" data-grad="45" data-angle="45"></div>
                <div class="opcion grad-90" data-grad="90" data-angle="90"></div>
            </div>
        </div>

        <div class="boton-container">
            <button id="boton-preview">Haz click para editar</button>
        </div>

        <div class="form-texto">
            <label>TEXTO DEL BOTON:</label>
            <input type="text" id="texto-input" placeholder="Escribe el texto del boton" value="Haz clic para editar">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
