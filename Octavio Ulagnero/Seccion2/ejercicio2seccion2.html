<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercio2seccion2</title>
    <style>
        .app { display: flex; flex-direction: column; min-height: 100vh; }

        .app-header {
            height: 60px;
            background: #6c63ff;
            flex-shrink: 0;
        }
        .app-body {
            display: flex;
            flex-direction: column;   /* mobile: apilado */
            flex: 1;
            min-height: calc(100vh - 60px);
        }

        .app-sidebar {
            display: none;
        }

        .app-main {
            flex: 1;
            background: #161b27;
            min-height: 400px;
        }

        @media (min-width: 768px) {
            .app-body {
                flex-direction: row;
            }
            .app-sidebar {
                display: block;
                flex: 0 0 220px;
                background-color: #1c2235;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="app-header"></div>
        <div class="app-body">
            <div class="app-sidebar"></div>
            <div class="app-main"></div>
        </div>
    </div>
</body>
</html>
