<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsenal FC - Efecto Hover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }

        .contenedor {
            display: flex;
            height: 350px;
            width: 550px;
            border-radius: 20px;
            background-image: url(https://imgs.search.brave.com/nSoAq4JAgShWJcDfXSf7a14a09UZm75qcan2YH_cV14/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4t/aW1naXguaGVhZG91/dC5jb20vbWVkaWEv/aW1hZ2VzLzAxZGJi/ZGNkODlmODRhZTAw/MjFjMGMwMjc3Yzc2/N2NkLUNvbGxlY3Rp/b24lMjBCYW5uZXIl/MjBBcnNlbmFsJTIw/RkMlMjBTdGFkaXVt/LmpwZz9hdXRvPWNv/bXByZXNzLGZvcm1h/dCZ3PTg4MiZoPTQ1/MCZxPTExMi41JmNy/b3A9ZmFjZXMmZml0/PWNyb3A);
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .contenedor:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
        }
        
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .fondoarsenal {
            background-image: url(https://imgs.search.brave.com/bOm6tQsG3i5ERBkH9l0F6d2jvQBr-sLJNCVMy9K4-pk/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tZWRp/YS50ZW5vci5jb20v/b2FLWHlhUGZOZ3dB/QUFBTS9hcnNlbmFs/LWFyc2VuYWwtdG9r/ZW4uZ2lm.gif);
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        
        .logo::before {
            content: "ARSENAL FC";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, rgba(227, 21, 21, 0.95) 0%, rgba(255, 255, 255, 0.95) 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 50%;
            opacity: 0;
            backdrop-filter: blur(4px);
            transition: opacity 2s cubic-bezier(0.68, -0.55, 0.265, 1.55), 
                        transform 2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 10;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }
        
        .logo:hover::before {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .logo::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff0000, #ffffff, #ff0000);
            border-radius: 50%;
            opacity: 0;
            z-index: -1;
            transition: opacity 1s ease;
        }
        
        .logo:hover::after {
            opacity: 0.6;
            animation: girar 2s linear infinite;
        }
        
        @keyframes girar {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* Texto decorativo debajo del logo */
        .texto-equipo {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.5s ease, bottom 0.5s ease;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        .contenedor:hover .texto-equipo {
            opacity: 1;
            bottom: -30px;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .contenedor {
                width: 90%;
                height: 300px;
            }
            .logo {
                width: 120px;
                height: 120px;
            }
            .logo::before {
                font-size: 14px;
                letter-spacing: 2px;
            }
            .texto-equipo {
                font-size: 10px;
                bottom: -35px;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="logo fondoarsenal"></div>
        <div class="texto-equipo">The Gunners 🔴⚪</div>
    </div>
</body>
</html>
