<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 1.1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .wrapper {
      display: flow-root; 
      width: 100%;
      flex: 1; 
      background: #010208; 
      border-radius: 0 0 0 18px; 
      overflow: hidden; 
    }

    .sidebar {
      float: left;
      width: 28%;
      margin-right: 2%;
      height: 400px; 
      background: #6c63ff; 
    }

    .main {
      float: left;
      width: 70%;
      height: 400px; 
      background: #1c2235; 
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="sidebar"></div>
    <div class="main"></div>
  </div>

</body>
</html>
