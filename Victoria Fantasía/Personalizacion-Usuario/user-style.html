<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Krona+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Krona+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>Personalización de Estilo</title>
    <script src="app.js"></script>
</head>

<body>
    <div class="main-container">
        <div class="container btn-container">
            <div class="title-container">
                <h2 class="cat-title">Colores letra</h2>
            </div>
            <button id="btn-purple" class="btn-bdr-groove purple-bg purple-font plain-btn"></button>
            <button id="btn-blue" class="btn-bdr-groove blue-bg blue-font plain-btn" data-style="blue-font"
                data-type="font-color"></button>
            <button id="btn-green" class="btn-bdr-groove green-bg green-font plain-btn" data-style="green-font"
                data-type="font-color"></button>
            <button id="btn-yellow" class="btn-bdr-groove yellow-bg yellow-font plain-btn" data-style="yellow-font"
                data-type="font-color"></button>
            <button id="btn-orange" class="btn-bdr-groove orange-bg orange-font plain-btn" data-style="orange-font"
                data-type="font-color"></button>
            <button id="btn-red" class="btn-bdr-groove red-bg red-font plain-btn" data-style="red-font"
                data-type="font-color"></button>
        </div>
        <div class="container btn-container">
            <div class="title-container">
                <h2 class="cat-title">Fondos</h2>
            </div>
            <button id="btn-purple-bg" class="btn-bdr-groove purple-bg plain-btn" data-style="purple-bg"
                data-type="bg-color"></button>
            <button id="btn-blue-bg" class="btn-bdr-groove blue-bg plain-btn" data-style="blue-bg"
                data-type="bg-color"></button>
            <button id="btn-green-bg" class="btn-bdr-groove green-bg plain-btn" data-style="green-bg"
                data-type="bg-color"></button>
            <button id="btn-yellow-bg" class="btn-bdr-groove yellow-bg plain-btn" data-style="yellow-bg"
                data-type="bg-color"></button>
            <button id="btn-orange-bg" class="btn-bdr-groove orange-bg plain-btn" data-style="orange-bg"
                data-type="bg-color"></button>
            <button id="btn-red-bg" class="btn-bdr-groove red-bg plain-btn" data-style="red-bg"
                data-type="bg-color"></button>
        </div>
        <div class="container btn-container">
            <div class="title-container">
                <h2 class="cat-title">Fondos degradé</h2>
            </div>
            <button id="btn-basic-grad" class="btn-bdr-groove plain-btn basic-linear-grad-bg" data-style="basic-grad"
                data-type="grad-bg"></button>
            <button id="btn-diagonal-grad" class="btn-bdr-groove plain-btn diagonal-linear-grad-bg"
                data-style="diagonal-grad" data-type="grad-bg"></button>
            <button id="btn-multicolor-grad" class="btn-bdr-groove plain-btn multicolor-linear-grad-bg"
                data-style="multicolor-grad" data-type="grad-bg"></button>
            <button id="btn-radial-grad" class="btn-bdr-groove plain-btn radial-grad-bg" data-style="radial-grad"
                data-type="grad-bg"></button>
            <button id="btn-harsh-grad" class="btn-bdr-groove plain-btn harsh-linear-grad-bg" data-style="harsh-grad"
                data-type="grad-bg"></button>
            <button id="btn-repeating-grad" class="btn-bdr-groove plain-btn repeating-linear-grad-bg"
                data-style="repeating-grad" data-type="grad-bg"></button>
        </div>
        <div class="container btn-container">
            <div class="title-container">
                <h2 class="cat-title">Sombras</h2>
            </div>
            <button id="btn-basic-shadow" class="btn-bdr-groove basic-shadow text-btn" data-style="basic-shadow"
                data-type="shadow">EJEMPLO</button>
            <button id="btn-harsh-shadow" class="btn-bdr-groove harsh-shadow text-btn" data-style="harsh-shadow"
                data-type="shadow">EJEMPLO</button>
            <button id="btn-multilpe-shadow" class="btn-bdr-groove multilpe-shadow text-btn"
                data-style="multilpe-shadow" data-type="shadow">EJEMPLO</button>
            <button id="btn-glow-shadow" class="btn-bdr-groove glow-shadow text-btn" data-style="glow-shadow"
                data-type="shadow">EJEMPLO</button>
            <button id="btn-floatings-shadow" class="btn-bdr-groove floating-shadow text-btn"
                data-style="floating-shadow" data-type="shadow">EJEMPLO</button>
            <button id="btn-engraved-shadow" class="btn-bdr-groove engraved-shadow text-btn"
                data-style="engraved-shadow" data-type="shadow">EJEMPLO</button>
        </div>
        <div class="container btn-container">
            <div class="title-container">
                <h2 class="cat-title">Bordes</h2>
            </div>
            <button id="btn-solid-brd" class="btn-bdr-groove text-btn" data-style="solid-brd" data-type="border">
                <span class="solid-brd span-btn shape-sample"></span>
            </button>
            <button id="btn-dotted-brd" class="btn-bdr-groove text-btn" data-style="dotted-brd" data-type="border">
                <span class="dotted-brd span-btn shape-sample"></span>
            </button>
            <button id="btn-dashed-brd" class="btn-bdr-groove text-btn" data-style="dashed-brd" data-type="border">
                <span class="dashed-brd span-btn shape-sample"></span>
            </button>
            <button id="btn-double-brd" class="btn-bdr-groove text-btn" data-style="double-brd" data-type="border">
                <span class="double-brd span-btn shape-sample"></span>
            </button>
            <button id="btn-groove-brd" class="btn-bdr-groove text-btn" data-style="groove-brd" data-type="border">
                <span class="groove-brd span-btn shape-sample"></span>
            </button>
            <button id="btn-rdge-brd" class="btn-bdr-groove text-btn" data-style="ridge-brd" data-type="border">
                <span class="ridge-brd span-btn shape-sample"></span>
            </button>
        </div>
        <div class="container form-container">
            <div>
                <button class="name-display" id="name-display">Su nombre</button>
            </div>
            <div class="input-container">
                <div class="name-input-container">
                    <input placeholder="Ingrese su nombre:" type="text" id="name-input">
                    <button id="name-btn" class="btn-submit">Enviar nombre</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
