<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boton ejercicio cesar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1117;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cd-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      
      background: conic-gradient(
        from 0deg,
        #2a2a4a 0deg,
        #4a2a3a 30deg,
        #2a4a4a 60deg,
        #3a3a5a 90deg,
        #5a4a3a 120deg,
        #3a4a5a 150deg,
        #4a3a5a 180deg,
        #2a3a4a 210deg,
        #3a2a3a 240deg,
        #4a4a2a 270deg,
        #5a3a4a 300deg,
        #2a2a3a 330deg,
        #2a2a4a 360deg
      );
      
      border: 3px solid rgba(180, 180, 200, 0.3);
      box-shadow: 
        0 0 20px rgba(100, 100, 150, 0.3),
        inset 0 0 30px rgba(0, 0, 0, 0.8);
      
      cursor: pointer;
      position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s;
      transform: rotate(0deg);
    }

    .cd-btn::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #0d1117;
      box-shadow: inset 0 0 5px #000000, 0 0 10px rgba(0,0,0,0.5);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(200, 200, 220, 0.2);
    }

    
    .cd-btn:hover {
      transform: rotate(360deg);
      box-shadow: 
        0 0 30px rgba(120, 120, 180, 0.5),
        inset 0 0 30px rgba(0, 0, 0, 0.9);
    }

    .cd-btn:active {
      transform: rotate(360deg) scale(0.95);
      box-shadow: 
        0 0 40px rgba(150, 150, 200, 0.6),
        inset 0 0 40px #000000;
      transition: transform 0.5s, box-shadow 0.5s;
    }
  </style>
</head>
<body>
  <button class="cd-btn"></button>
</body>
</html>
