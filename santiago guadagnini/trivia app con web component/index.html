<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="contenedor">
    <header>
      <h1>Trivia App</h1>
    </header>

    
    <div id="pantalla-inicio" class="pantalla visible">
      <div class="controles">

        
        <trivia-select
          label="Categoría:"
          select-id="categoria">
        </trivia-select>

        <trivia-select
          label="Dificultad:"
          select-id="dificultad"
          options="easy:Fácil|medium:Medio|hard:Difícil"
          default="medium">
        </trivia-select>

        <trivia-select
          label="Cantidad de preguntas:"
          select-id="cantidad"
          options="5:5|10:10|15:15|20:20"
          default="10">
        </trivia-select>

      </div>

      
      <trivia-boton id="btn-jugar" texto="Jugar"></trivia-boton>

      <div id="mensaje-cargando" class="oculto">Cargando preguntas…</div>

      <div id="mensaje-error" class="error oculto">
        <span id="texto-error"></span>
        <trivia-boton id="btn-reintentar" texto="Reintentar" class="oculto"></trivia-boton>
      </div>
    </div>

   
    <div id="pantalla-juego" class="pantalla">

      
      <trivia-marcador id="marcador" class="info-partida" puntaje="0" progreso=""></trivia-marcador>

      <h2 id="texto-pregunta"></h2>
      <div id="opciones" class="opciones"></div>
      <div id="feedback" class="feedback oculto"></div>

      <trivia-boton id="btn-siguiente" texto="Siguiente" class="oculto"></trivia-boton>
    </div>

   
    <div id="pantalla-fin" class="pantalla">
      <h2>¡Partida terminada!</h2>
      <p id="puntaje-final"></p>

      
      <trivia-historial id="historial" class="historial"></trivia-historial>

      <trivia-boton id="btn-volver-jugar" texto="Volver a jugar"></trivia-boton>
    </div>
  </div>

  
  <script src="TriviaBoton.js"></script>
  <script src="TriviaSelect.js"></script>
  <script src="TriviaMarcador.js"></script>
  <script src="TriviaHistorial.js"></script>


  <script src="TriviaAPI.js"></script>
  <script src="TriviaGame.js"></script>
  <script src="main.js"></script>
</body>
</html>
